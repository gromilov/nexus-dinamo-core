name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. Сборка основного manifest-site
      - name: Install dependencies (manifest-site)
        run: cd manifest-site && npm install
      
      - name: Build (manifest-site)
        run: cd manifest-site && npm run build

      # 2. Сборка архива надри-manifest
      - name: Install dependencies (nadir-manifest)
        run: cd nadir-manifest && npm install
      
      - name: Build (nadir-manifest)
        run: cd nadir-manifest && npm run build

      # 3. Подготовка общей структуры dist
      - name: Prepare final distribution
        run: |
          mkdir -p final_dist
          cp -R manifest-site/dist/* final_dist/
          mkdir -p final_dist/nadir
          cp -R nadir-manifest/dist/* final_dist/nadir/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
