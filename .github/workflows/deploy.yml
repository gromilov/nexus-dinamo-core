name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. Сборка Сайта Ядра (Core Site)
      - name: Install dependencies (dinamo)
        run: cd sites/dinamo && npm install
      
      - name: Build (dinamo)
        run: cd sites/dinamo && npm run build

      # 2. Сборка Nexus
      - name: Install dependencies (nexus)
        run: cd sites/nexus && npm install
      
      - name: Build (nexus)
        run: cd sites/nexus && npm run build

      # 3. Сборка Nadir
      - name: Install dependencies (nadir)
        run: cd sites/nadir && npm install
      
      - name: Build (nadir)
        run: cd sites/nadir && npm run build


      # 5. Подготовка общей структуры dist
      - name: Prepare final distribution
        run: |
          mkdir -p final_dist
          cp -R sites/dinamo/dist/* final_dist/
          mkdir -p final_dist/nexus
          cp -R sites/nexus/dist/* final_dist/nexus/
          mkdir -p final_dist/nadir
          cp -R sites/nadir/dist/* final_dist/nadir/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
